name: HTML CI

on:
  push:
    branches:
      - main

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: List files
        run: ls -la

      - name: Verify HTML file exists
        run: test -f index.html

      - name: Success
        run: echo "CI Pipeline Passed!"